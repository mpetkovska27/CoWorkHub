apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: coworkhub
  labels:
    app: postgres
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: coworkhub
  labels:
    app: postgres
    role: replica
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: postgres-1
  ports:
    - port: 5432
      targetPort: 5432