apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coworkhub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mpetkovska27/CoWorkHub.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: coworkhub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
