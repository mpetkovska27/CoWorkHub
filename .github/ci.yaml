name: CoWorkHub CI

on:
  push:
    branches: [ main, devops ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    name: Backend – lint & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd CoWorkHubProject
          pip install -r requirements.txt

      - name: Django system check
        run: |
          cd CoWorkHubProject
          python manage.py check
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: coworking_db
          DB_USER: postgres
          DB_PASSWORD: postgres

  frontend-lint:
    name: Frontend – lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build

    docker-build:
    name: Docker – build & push
    runs-on: ubuntu-latest
    needs: [ backend-lint, frontend-lint ]
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./CoWorkHubProject
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coworkhub-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coworkhub-frontend:latest
      
       - name: Build and push database
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coworkhub-db:latest