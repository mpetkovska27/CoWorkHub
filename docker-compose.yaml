services:

  db:
    image: postgres:16-alpine
    container_name: coworkhub_db
    restart: always
    environment:
      POSTGRES_DB: coworking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2703
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/queries/coworkhub.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/queries/procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./database/queries/report_1.sql:/docker-entrypoint-initdb.d/03_report_1.sql
      - ./database/queries/report_2.sql:/docker-entrypoint-initdb.d/04_report_2.sql
      - ./database/queries/seed_data.sql:/docker-entrypoint-initdb.d/05_seed.sql
    networks:
      - backend_net
  
  backend:
    build:
      context: ./CoWorkHubProject
      dockerfile: Dockerfile
    container_name: coworkhub_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: coworking_db
      DB_USER: postgres
      DB_PASSWORD: 2703
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - frontend_net
      - backend_net
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coworkhub_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - frontend_net
  
volumes:
  postgres_data:
  
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    